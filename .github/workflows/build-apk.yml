name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true   # опционально

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            autoconf automake libtool pkg-config cmake git \
            openjdk-17-jdk zlib1g-dev libncurses5-dev libncursesw5-dev \
            libtinfo5 libffi-dev libssl-dev python3-dev python3-pip \
            cython build-essential libsdl2-dev libsdl2-image-dev \
            libsdl2-mixer-dev libsdl2-ttf-dev libjpeg-dev libpng-dev \
            libfreetype6-dev libgles2-mesa-dev libgl1-mesa-dev \
            libglib2.0-dev

      - name: Cache Buildozer global directory
        uses: actions/cache@v4
        with:
          path: ~/.buildozer
          key: ${{ runner.os }}-buildozer-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            ${{ runner.os }}-buildozer-

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install cython==0.29.33 buildozer

      - name: Build APK
        run: |
          buildozer android debug --verbose

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: CPlay-APK
          path: bin/*.apk
