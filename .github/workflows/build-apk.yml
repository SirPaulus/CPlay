name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:  # позволяет запускать вручную из интерфейса GitHub

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'  # Buildozer лучше работает с 3.10

      - name: Cache Buildozer global directory
        uses: actions/cache@v4
        with:
          path: ~/.buildozer
          key: ${{ runner.os }}-buildozer-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            ${{ runner.os }}-buildozer-

      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            autoconf automake libtool pkg-config cmake git \
            openjdk-17-jdk zlib1g-dev libncurses5-dev libncursesw5-dev \
            libtinfo5 libffi-dev libssl-dev python3-dev python3-pip \
            cython build-essential libsdl2-dev libsdl2-image-dev \
            libsdl2-mixer-dev libsdl2-ttf-dev libjpeg-dev libpng-dev \
            libfreetype6-dev libgles2-mesa-dev libgl1-mesa-dev \
            libglib2.0-dev

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip setuptools wheel
          pip install cython buildozer

      - name: Configure buildozer
        run: |
          # Если buildozer.spec уже есть, он используется.
          # При необходимости можно сгенерировать заново, но лучше хранить в репозитории.
          # Здесь мы просто убедимся, что файл есть.
          test -f buildozer.spec || buildozer init

      - name: Build APK
        run: |
          buildozer android debug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: CPlay-APK
          path: bin/*.apk
